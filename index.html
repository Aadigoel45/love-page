<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadi 💜 Palak</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:sans-serif;}

.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;}

.top{position:absolute;top:15px;width:100%;text-align:center;}
.title{color:#f0a0cc;}
.date{color:#aaa;font-size:12px;}

.emoj{font-size:80px;margin-bottom:10px;}
.q-text{color:#f0d8f0;font-size:22px;}
.q-sub{color:#aaa;margin-bottom:20px;}

.yes-btn{background:#7b2d6a;color:white;border:none;border-radius:50px;padding:12px 35px;cursor:pointer;}
.no-btn{position:absolute;border:1px solid #444;color:white;background:transparent;border-radius:50px;padding:8px 20px;}

.result{display:none;}
.result.show{display:flex;flex-direction:column;align-items:center;}
</style>
</head>

<body>

<div class="wrap" id="wrap">

<div class="top">
<div class="title">Aadi 💜 Palak</div>
<div class="date">18 April — The day Aadi proposed Palkuuu 🌷</div>
</div>

<div id="quiz">
<div class="emoj" id="emoj">💜</div>
<div class="q-text" id="qtext">Will you be mine?</div>
<div class="q-sub" id="qsub">just say yes 💜</div>
<button class="yes-btn" onclick="onYes()">Yes 💜</button>
</div>

<div class="result" id="result">
<h2 style="color:#f0a0cc;">She said YES 💜</h2>
</div>

<button class="no-btn" id="noBtn" onmouseenter="onNo()">No 🙅</button>

<div id="player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
var playerReady = false;
var player;

/* YOUTUBE INIT */
function onYouTubeIframeAPIReady(){
  player = new YT.Player('player',{
    height:'0',
    width:'0',
    videoId:'kffacxfA7G4',
    playerVars:{controls:0},
    events:{
      onReady: function(){
        playerReady = true;
      }
    }
  });
}

/* QUESTIONS */
var questions=[
{e:'💜',q:'Will you be mine?',s:'just say yes 💜'},
{e:'🥺',q:'Please reconsider...',s:'🥺'},
{e:'🌸',q:'I think about you a lot...',s:'still no? 👀'},
{e:'💌',q:'Let me make you happy?',s:'🌷'},
{e:'🥺',q:'Last chance...?',s:'please'}
];

var noCount=0;
var noBtn=document.getElementById('noBtn');

function place(){
  noBtn.style.left=Math.random()*window.innerWidth+'px';
  noBtn.style.top=Math.random()*window.innerHeight+'px';
}

function onNo(){
  noCount=Math.min(noCount+1,questions.length-1);
  let q=questions[noCount];
  document.getElementById('qtext').innerText=q.q;
  document.getElementById('qsub').innerText=q.s;
  document.getElementById('emoj').innerText=q.e;
  place();
}

/* ✅ FIXED YES BUTTON */
function onYes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').classList.add('show');

  // SAFE PLAY
  if(playerReady){
    player.playVideo();
  } else {
    console.log("Player not ready yet");
  }
}

/* ALSO START MUSIC ON FIRST CLICK */
document.body.addEventListener("click",()=>{
  if(playerReady){
    player.playVideo();
  }
},{once:true});

setTimeout(place,200);
</script>

</body>
</html>
