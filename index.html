<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadi 💜 Palak</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#0a0a0f;color:white;overflow:hidden;}

.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;}

h1{color:#f0a0cc;margin-bottom:10px;}
.date{color:#aaa;font-size:14px;margin-bottom:20px;}

.emoj{font-size:80px;margin-bottom:10px;animation:float 2s infinite alternate;}
@keyframes float{from{transform:translateY(0);}to{transform:translateY(-15px);}}

.q-text{font-size:22px;margin-bottom:10px;}
.q-sub{font-size:14px;color:#aaa;margin-bottom:20px;}

button{cursor:pointer;border:none;border-radius:50px;padding:12px 35px;font-size:16px;}

.yes{background:#ff4da6;color:white;box-shadow:0 0 20px pink;}
.no{position:absolute;background:transparent;border:1px solid #555;color:white;}

.result{display:none;}
.result.show{display:block;}

canvas{position:absolute;top:0;left:0;}

</style>
</head>

<body>

<div class="wrap" id="wrap">

<h1>Aadi 💜 Palak</h1>
<div class="date">18 April — The day Aadi proposed Palkuuu 🌷</div>

<div id="quiz">
<div class="emoj" id="emoj">💜</div>
<div class="q-text">Will you be mine forever?</div>
<div class="q-sub">Just say yes... it will be beautiful 💫</div>

<button class="yes" onclick="yes()">Yes 💜</button>
</div>

<div class="result" id="result">
<h1>She said YES 💜</h1>
<p>Our story starts here... forever 🌷</p>
</div>

<button class="no" id="noBtn" onmouseover="moveNo()">No 🙅</button>

<audio id="music" autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<canvas id="canvas"></canvas>

</div>

<script>
let noBtn=document.getElementById("noBtn");
let wrap=document.getElementById("wrap");

function moveNo(){
  let x=Math.random()*window.innerWidth;
  let y=Math.random()*window.innerHeight;
  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
}

function yes(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").classList.add("show");
  startConfetti();
}

// 🎉 Confetti
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function startConfetti(){
  for(let i=0;i<100;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6,
      d:Math.random()*100
    });
  }
  draw();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="pink";
  confetti.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fill();
    c.y+=2;
    if(c.y>canvas.height) c.y=0;
  });
  requestAnimationFrame(draw);
}
</script>

</body>
</html>
