<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadi 💜 Palak</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:sans-serif;overflow:hidden;}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;}

.top{position:absolute;top:20px;text-align:center;}
.title{color:#f0a0cc;font-size:20px;}
.date{color:#aaa;font-size:13px;}

.stars{position:absolute;width:100%;height:100%;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}

.emoj{font-size:80px;margin-bottom:10px;}
.q-text{color:#f0d8f0;font-size:22px;}
.q-sub{color:#aaa;font-size:13px;margin-bottom:20px;}

.yes-btn{background:#ff4da6;color:white;border:none;border-radius:50px;padding:12px 40px;font-size:18px;cursor:pointer;}
.no-btn{position:absolute;background:transparent;border:1px solid #555;color:white;border-radius:50px;padding:8px 20px;cursor:pointer;}

.result{display:none;}
.result.show{display:block;color:#f0a0cc;}

</style>
</head>

<body>

<div class="wrap" id="wrap">

<div class="top">
<div class="title">Aadi 💜 Palak</div>
<div class="date">18 April — The day Aadi proposed Palkuuu 🌷</div>
</div>

<div class="stars" id="stars"></div>

<div id="quiz">
<div class="emoj" id="emoj">💜</div>
<div class="q-text" id="qtext">Will you be mine?</div>
<div class="q-sub" id="qsub">just say yes 💜</div>
<button class="yes-btn" onclick="onYes()">Yes 💜</button>
</div>

<div class="result" id="result">
<h1>She said YES 💜</h1>
<p>Our forever starts today 🌷</p>
</div>

<button class="no-btn" id="noBtn" onmouseover="onNo()">No 🙅</button>

<!-- 🎵 REAL SONG -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/14/audio_7a1d6b82a6.mp3">
</audio>

</div>

<script>
var questions=[
{e:'💜',q:'Will you be mine?',s:'just say yes 💜'},
{e:'🥺',q:'Please think again...',s:'I really mean it 😔'},
{e:'🌸',q:'I think about you a lot...',s:'don’t say no 😭'},
{e:'💌',q:'Let me make you happy everyday?',s:'I’ll try my best 🌷'},
{e:'🥺',q:'Last chance... will you be mine?',s:'please 🥺'}
];

var noCount=0;
var noBtn=document.getElementById("noBtn");
var emoj=document.getElementById("emoj");

function makeStars(){
let s=document.getElementById("stars");
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.className="star";
d.style.width="2px";
d.style.height="2px";
d.style.top=Math.random()*100+"%";
d.style.left=Math.random()*100+"%";
s.appendChild(d);
}
}

function moveBtn(){
noBtn.style.left=Math.random()*window.innerWidth+"px";
noBtn.style.top=Math.random()*window.innerHeight+"px";
}

function onNo(){
noCount=Math.min(noCount+1,questions.length-1);
let q=questions[noCount];

document.getElementById("qtext").innerText=q.q;
document.getElementById("qsub").innerText=q.s;
emoj.innerText=q.e;

moveBtn();
}

function onYes(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").classList.add("show");

let music=document.getElementById("music");
music.play();
}

makeStars();
setTimeout(moveBtn,300);
</script>

</body>
</html>
