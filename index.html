<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Palak 💜</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:sans-serif;}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center;position:relative;overflow:hidden;}
.stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.15;}to{opacity:0.85;}}

.emoj{font-size:80px;margin-bottom:0.8rem;}
.emoj.idle{animation:sway 3.5s ease-in-out infinite alternate;}
.emoj.happy{animation:bop 0.45s infinite alternate;}
.emoj.sad{animation:droop 0.9s infinite alternate;}

@keyframes sway{from{transform:rotate(-5deg);}to{transform:rotate(5deg);}}
@keyframes bop{from{transform:translateY(0);}to{transform:translateY(-14px) scale(1.1);}}
@keyframes droop{from{transform:rotate(-5deg);}to{transform:rotate(5deg) translateY(6px);}}

.name-tag{font-size:12px;color:#c060a0;margin-bottom:0.5rem;}
.q-text{font-size:22px;color:#f0d8f0;margin-bottom:0.5rem;}
.q-sub{font-size:13px;color:#a070a0;margin-bottom:2rem;}

.yes-btn{background:#7b2d6a;color:white;border:none;border-radius:50px;padding:12px 40px;font-size:18px;cursor:pointer;}
.no-btn{position:absolute;background:transparent;color:#fff;border:1px solid #555;border-radius:50px;padding:10px 20px;cursor:pointer;}

.result{display:none;text-align:center;}
.result.show{display:block;}

</style>
</head>

<body>

<div class="wrap" id="wrap">
  <div class="stars" id="stars"></div>

  <div id="quiz">
    <div class="emoj idle" id="emoj">💜</div>
    <div class="name-tag">palak 🌷</div>
    <div class="q-text" id="qtext">Will you be mine?</div>
    <div class="q-sub" id="qsub">just say yes 💜</div>
    <button class="yes-btn" onclick="onYes()">Yes 💜</button>
  </div>

  <div class="result" id="result">
    <h2 style="color:#f0a0cc;">She said YES 💜</h2>
    <p style="color:#fff;">This is just the beginning 🌷</p>
  </div>

  <button class="no-btn" id="noBtn" onmouseenter="onNo()">No 🙅</button>
</div>

<script>
var noBtn=document.getElementById('noBtn');
var emoj=document.getElementById('emoj');

function makeStars(){
  var s=document.getElementById('stars');
  for(var i=0;i<50;i++){
    var d=document.createElement('div');
    d.className='star';
    d.style.width='2px';
    d.style.height='2px';
    d.style.top=Math.random()*100+'%';
    d.style.left=Math.random()*100+'%';
    s.appendChild(d);
  }
}

function place(){
  var r=document.getElementById('wrap').getBoundingClientRect();
  noBtn.style.left=Math.random()*r.width+'px';
  noBtn.style.top=Math.random()*r.height+'px';
}

function onNo(){
  emoj.className='emoj sad';
  setTimeout(()=>{emoj.className='emoj idle';},500);
  place();
}

function onYes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').classList.add('show');
}

makeStars();
setTimeout(place,200);
window.addEventListener('resize',place);
</script>

</body>
</html>
