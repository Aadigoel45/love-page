<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadi 💜 Palak</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;font-family:sans-serif;overflow:hidden;}

.wrap{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.title{color:#f0a0cc;}
.date{color:#aaa;font-size:12px;margin-bottom:20px;}

.emoj{font-size:80px;transition:0.3s;}
.q-text{color:#f0d8f0;font-size:22px;transition:0.3s;}
.q-sub{color:#aaa;margin-bottom:20px;transition:0.3s;}

.yes-btn{
background:#ff4da6;
color:white;
border:none;
padding:12px 35px;
border-radius:50px;
cursor:pointer;
}

.no-btn{
position:absolute;
background:transparent;
border:1px solid #444;
color:white;
padding:8px 20px;
border-radius:50px;
cursor:pointer;
}

.result{display:none;}
.result.show{display:flex;flex-direction:column;align-items:center;}

.float{
position:absolute;
animation:up 2s forwards;
}
@keyframes up{
to{transform:translateY(-150px);opacity:0;}
}

.big-heart{
font-size:120px;
animation:boom 1s ease;
}
@keyframes boom{
0%{transform:scale(0);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="wrap" id="wrap">

<div class="title">Aadi 💜 Palak</div>
<div class="date">18 April — The day Aadi proposed Palkuuu 🌷</div>

<div id="quiz">
<div class="emoj" id="emoj">💜</div>
<div class="q-text" id="qtext">Will you be mine?</div>
<div class="q-sub" id="qsub">just say yes 💜</div>
<button class="yes-btn" onclick="onYes()">Yes 💜</button>
</div>

<div class="result" id="result">
<div class="big-heart">💜</div>
<h2 style="color:#f0a0cc;">She said YES 💜</h2>
</div>

<button class="no-btn" id="noBtn">No 🙅</button>

<div id="player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let musicStarted=false;

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
height:'0',
width:'0',
videoId:'kffacxfA7G4',
playerVars:{controls:0}
});
}

/* QUESTIONS */
let questions=[
{e:'💜',q:'Will you be mine?',s:'just say yes 💜'},
{e:'🥺',q:'Please think again...',s:'I really like you 🥺'},
{e:'🌸',q:'I think about you a lot...',s:'don’t say no 😭'},
{e:'💌',q:'Let me make you happy?',s:'I promise 🌷'},
{e:'🥺',q:'Last chance...?',s:'please 🥺'}
];

let noCount=0;
let maxNo=6;
let noBtn=document.getElementById("noBtn");

function moveBtn(){
noBtn.style.left=Math.random()*window.innerWidth+"px";
noBtn.style.top=Math.random()*window.innerHeight+"px";
}

/* FLOAT ANIMATION */
function spawn(e){
for(let i=0;i<5;i++){
let f=document.createElement("div");
f.className="float";
f.innerText=e;
f.style.left=Math.random()*90+"%";
f.style.top=Math.random()*70+"%";
document.getElementById("wrap").appendChild(f);
setTimeout(()=>f.remove(),2000);
}
}

/* NO BUTTON */
noBtn.addEventListener("mouseenter",()=>{

// MUSIC START ONLY FIRST TIME
if(!musicStarted && player){
player.playVideo();
musicStarted=true;
}

noCount++;

// LIMIT HOVERS
if(noCount>=maxNo){
noBtn.style.display="none";
return;
}

let q=questions[Math.min(noCount,questions.length-1)];

document.getElementById("qtext").innerText=q.q;
document.getElementById("qsub").innerText=q.s;
document.getElementById("emoj").innerText=q.e;

// ANIMATION EACH STEP
spawn(['🌸','💔','✨','🌷'][noCount%4]);

moveBtn();
});

/* YES BUTTON */
function onYes(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").classList.add("show");

// BIG ANIMATION
spawn('💜');
spawn('🌸');
spawn('✨');

// ensure music plays if not yet
if(player && !musicStarted){
player.playVideo();
musicStarted=true;
}
}

moveBtn();
</script>

</body>
</html>
