<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadi 💜 Palak</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:sans-serif;}

.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;position:relative;overflow:hidden;}

.top{position:absolute;top:15px;width:100%;text-align:center;}
.title{color:#f0a0cc;}
.date{color:#aaa;font-size:12px;}

.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;}to{opacity:1;}}

.emoj{font-size:80px;margin-bottom:10px;}
.q-text{color:#f0d8f0;font-size:22px;}
.q-sub{color:#aaa;margin-bottom:20px;}

.yes-btn{background:#7b2d6a;color:white;border:none;border-radius:50px;padding:12px 35px;font-size:18px;cursor:pointer;}
.no-btn{position:absolute;border:1px solid #444;color:white;background:transparent;border-radius:50px;padding:8px 20px;cursor:pointer;}

.result{display:none;}
.result.show{display:flex;flex-direction:column;align-items:center;}

.floatie{position:absolute;pointer-events:none;animation:floatUp 2.5s forwards;}
@keyframes floatUp{to{transform:translateY(-150px);opacity:0;}}

.confetti-dot{position:absolute;border-radius:50%;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(200px) rotate(360deg);opacity:0;}}
</style>
</head>

<body>

<div class="wrap" id="wrap">

<div class="top">
<div class="title">Aadi 💜 Palak</div>
<div class="date">18 April — The day Aadi proposed Palkuuu 🌷</div>
</div>

<div id="quiz">
<div class="emoj" id="emoj">💜</div>
<div class="q-text" id="qtext">Will you be mine?</div>
<div class="q-sub" id="qsub">just say yes 💜</div>
<button class="yes-btn" onclick="onYes()">Yes 💜</button>
</div>

<div class="result" id="result">
<h2 style="color:#f0a0cc;">She said YES 💜</h2>
</div>

<button class="no-btn" id="noBtn">No 🙅</button>

<div id="player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* ================= MUSIC ================= */
let player;
let musicStarted=false;

function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{
    height:'0',
    width:'0',
    videoId:'kffacxfA7G4',
    playerVars:{controls:0}
  });
}

/* ================= QUESTIONS ================= */
var questions=[
  {e:'💜',q:'Will you be mine?',s:'just say yes 💜'},
  {e:'🥺',q:'Okay but... will you reconsider?',s:'please 🥺'},
  {e:'🌸',q:'What if I told you I think about you way too often?',s:'still no? 👀'},
  {e:'💌',q:'Will you let me make you happy everyday?',s:'I promise 🌷'},
  {e:'🥺',q:'Last chance... will you be mine?',s:'please 🥺'}
];

var noCount=0;
var noBtn=document.getElementById('noBtn');
var emoj=document.getElementById('emoj');

/* ================= FLOAT EMOJIS ================= */
function spawn(e){
  for(let i=0;i<4;i++){
    let h=document.createElement('div');
    h.className='floatie';
    h.textContent=e;
    h.style.left=(10+Math.random()*80)+'%';
    h.style.top=(20+Math.random()*60)+'%';
    document.getElementById('wrap').appendChild(h);
    setTimeout(()=>h.remove(),2500);
  }
}

/* ================= NO BUTTON ================= */
noBtn.addEventListener("mouseenter",function(){

  // 🎵 START MUSIC ON FIRST HOVER ONLY
  if(!musicStarted && player){
    player.playVideo();
    musicStarted=true;
  }

  noCount=Math.min(noCount+1,questions.length-1);
  let q=questions[noCount];

  document.getElementById('qtext').innerText=q.q;
  document.getElementById('qsub').innerText=q.s;
  emoj.innerText=q.e;

  spawn(['✨','🌷','🩷','🌸'][noCount%4]);

  // move button
  noBtn.style.left=Math.random()*window.innerWidth+'px';
  noBtn.style.top=Math.random()*window.innerHeight+'px';
});

/* ================= YES BUTTON ================= */
function onYes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').classList.add('show');

  spawn('💜');
  launchConfetti();

  // if she didn't hover, still play music
  if(player && !musicStarted){
    player.playVideo();
    musicStarted=true;
  }
}

/* ================= CONFETTI ================= */
function launchConfetti(){
  for(let i=0;i<40;i++){
    let d=document.createElement('div');
    d.className='confetti-dot';
    d.style.width='6px';
    d.style.height='6px';
    d.style.background='pink';
    d.style.left=Math.random()*100+'%';
    d.style.top='20%';
    d.style.animationDuration=(1+Math.random())+'s';
    document.getElementById('wrap').appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }
}

/* ================= STARS ================= */
for(let i=0;i<60;i++){
  let d=document.createElement('div');
  d.className='star';
  d.style.width='2px';
  d.style.height='2px';
  d.style.top=Math.random()*100+'%';
  d.style.left=Math.random()*100+'%';
  document.getElementById('wrap').appendChild(d);
}
</script>

</body>
</html>
